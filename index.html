<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Discord - Larp e Crack!</title>
    <style>
        /* Stili generali della pagina */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c2f33; /* Colore di sfondo scuro stile Discord */
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Contenitore centrale */
        .container {
            background-color: #23272a;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        /* Stile dell'immagine */
        .immagine-profilo {
            width: 100%;
            max-width: 250px; /* Grandezza ideale per un logo */
            height: auto;
            border-radius: 50%; /* Rende l'immagine perfettamente rotonda come su Discord */
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); /* Un po' di ombra per farla risaltare */
        }

        /* Stile dei testi */
        h1 {
            margin: 0 0 10px 0;
            font-size: 28px;
        }

        p {
            color: #b9bbbe;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Stile del pulsante Discord */
        .discord-btn {
            background-color: #5865F2; /* Blu ufficiale di Discord */
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            transition: background-color 0.3s ease;
            display: inline-block;
        }

        /* Effetto quando passi sopra il pulsante col mouse */
        .discord-btn:hover {
            background-color: #4752C4;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Qui c'è il nome esatto della tua immagine -->
        <img src="WhatsApp Image 2026-06-19 at 3.42.45 AM.jpeg" alt="Logo Larp e Crack!" class="immagine-profilo">
        
        <!-- Le tue scritte -->
        <h1>Benvenuto sul nostro server Discord, ''Larp e Crack!''</h1>
        <p>Unisciti a noi per chiacchierare, giocare insieme e conoscere nuove persone. Siamo una community attiva e accogliente, non vediamo l'ora di conoscerti!</p>
        
        <!-- Il link al tuo server Discord -->
        <a href="LINK_DEL_TUO_SERVER_DISCORD" target="_blank" class="discord-btn">
            Unisciti ORA al Server Discord!
        </a>
    </div>

</body>
</html>
